# Optional SNOMED CT terminology server — https://github.com/IHTSDO/snowstorm
# Requires Docker with ~4GB+ RAM free for Elasticsearch + Snowstorm.
# After startup, load a SNOMED CT International RF2 release into Snowstorm or lookups return empty/errors.
#
#   docker compose -f docker-compose.snowstorm.yml up -d
#   export SNOWSTORM_URL=http://localhost:8081
# (Host 8081 → container 8080 to avoid clashing with EHRbase on 8080.)
#
# See: https://github.com/IHTSDO/snowstorm/blob/master/docs/loading-snomed.md

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: snowstorm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - node.name=snowstorm
      - cluster.name=snowstorm-cluster
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - snowstorm-elastic:/usr/share/elasticsearch/data
    networks:
      snowstorm-net:
        aliases:
          - es
    healthcheck:
      test: ["CMD", "curl", "-f", "http://es:9200"]
      interval: 2s
      timeout: 2s
      retries: 60
    ports:
      - "127.0.0.1:9200:9200"

  snowstorm:
    image: snomedinternational/snowstorm:latest
    container_name: snowstorm
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: "java -Xms512m -Xmx1g --add-opens java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED -cp @/app/jib-classpath-file org.snomed.snowstorm.SnowstormApplication --elasticsearch.urls=http://es:9200"
    networks:
      snowstorm-net:
        aliases:
          - snowstorm
    ports:
      - "127.0.0.1:8081:8080"

networks:
  snowstorm-net:

volumes:
  snowstorm-elastic:
