# Fly.io — full API (SNOMED RF2 + rest of routes). Option B for Lovable: set SNOMED_API_URL to https://<this-app>.fly.dev
#
# First time:
#   fly apps create <your-app-name>   # then set `app` below, or: fly launch
#   fly volumes create snomed_data --region <same-as-app> --size 20
#   fly secrets set ...
#   fly deploy
#
app = "arc-snomed-api"
# LHR volume placement hit "insufficient resources" for this org; AMS often frees capacity.
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  SNOMED_RF2_SQLITE_PATH = "/data/snomed-rf2.db"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  # 2g failed placement with volume in some orgs; 1g is enough for API + SQLite SNOMED reads.
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "snomed_data"
  destination = "/data"
